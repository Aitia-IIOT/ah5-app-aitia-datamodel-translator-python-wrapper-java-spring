############################################
###       APPLICATION PARAMETERS         ###
############################################

# Address and port where the http webserver listening (0.0.0.0 denotes all available IP addresses)
server.address=0.0.0.0
server.port=12512

service.registry.address=127.0.0.1
service.registry.port=8443

############################################
###          CUSTOM PARAMETERS           ###
############################################

# Address to register into Service Registry with
domain.name=127.0.0.1

# The name of the system. If system uses X.509 certificate this should be consistent with the first part of the Common Name in the certificate.
system.name=WrapperForPythonDataModelTranslator

# Method to authenticate service requester systems
authentication.policy=declared

# Enable/disable the requirement for authorization control (when ConsumerAuthorization Arrowhead Core System is deployed to the local cloud)
enable.authorization=false

# Show all request/response in debug log
log.all.request.and.response=false

# List where the elements represent input-output pairs in sets of two (must contain even number of elements)
model.ids=EC1,IPC2581,EC1,ISO10303

# Path for the initialization script that creates the mapping table
init.script.location=C:/Users/sga/Documents/PythonDataModelTranslation/init.py

# Path for the translation script
translation.script.location=C:/Users/sga/Documents/PythonDataModelTranslation/translation.py

# Input folder for the translation script
translation.script.input.folder=C:/Users/sga/Documents/PythonDataModelTranslation/input

# Output folder for the translation script
translation.script.output.folder=C:/Users/sga/Documents/PythonDataModelTranslation/output

############################################
